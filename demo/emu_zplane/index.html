<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-mu Z-plane Morph Designer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="panel">
        <h1>E-mu Z-Plane Morph Designer</h1>

        <div id="lcd">
            <canvas id="canvas-response" width="480" height="240"></canvas>
            <div id="impulse-row">
                <span class="canvas-label">IMPULSE</span>
                <canvas id="canvas-impulse" width="256" height="80"></canvas>
            </div>
        </div>

        <div id="controls">
            <div id="pill-row">
                <label for="pill-select">Pill</label>
                <select id="pill-select"></select>
            </div>

            <div class="ctrl-row">
                <label for="morph-slider">Morph</label>
                <input type="range" id="morph-slider" min="0" max="1" step="0.001" value="0">
            </div>

            <div class="ctrl-row">
                <label for="q-slider">Q</label>
                <input type="range" id="q-slider" min="0" max="1" step="0.001" value="0.5">
            </div>
        </div>

        <div id="stim-row">
            <button id="stim-impulse">Impulse</button>
            <button id="stim-sine">Sine</button>
            <button id="stim-noise">Noise</button>
            <button id="stim-click">Click</button>
        </div>

        <div id="transport">
            <button id="btn-play">Play</button>
            <button id="btn-stop">Stop</button>
            <button id="btn-parity">Parity Check</button>
        </div>

        <div id="status">Ready.</div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
