<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>TRENCH Forge</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
canvas { flex:1; display:block; }
#label {
    position:fixed; bottom:12px; right:16px;
    font: 11px Consolas, monospace; color:#33ff33; opacity:0.6;
}
#status {
    position:fixed; bottom:12px; left:16px;
    font: 9px Consolas, monospace; color:#1a3a1a;
}
</style></head><body>
<canvas id="c"></canvas>
<div id="label"></div>
<div id="status">polling...</div>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var labelEl = document.getElementById('label');
var statusEl = document.getElementById('status');
var freqs = [], targetDb = [], currentDb = [];
var lastJson = '';

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

var FMIN = 20, FMAX = 19500, DBMIN = -48, DBMAX = 30;
var logMin = Math.log10(FMIN), logRange = Math.log10(FMAX) - logMin;
var dbRange = DBMAX - DBMIN;

function draw() {
    var w = canvas.width, h = canvas.height;

    // Phosphor fade — leaves faint trail
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, 0, w, h);

    // Grid
    ctx.strokeStyle = '#0d1f0d'; ctx.lineWidth = 1; ctx.beginPath();
    [24,12,0,-12,-24,-36,-48].forEach(function(db) {
        var y = h - h * (db - DBMIN) / dbRange;
        ctx.moveTo(0, y); ctx.lineTo(w, y);
    });
    [100,1000,10000].forEach(function(f) {
        var x = w * (Math.log10(f) - logMin) / logRange;
        ctx.moveTo(x, 0); ctx.lineTo(x, h);
    });
    ctx.stroke();

    // Subtle labels
    ctx.fillStyle = '#1a3a1a'; ctx.font = '10px Consolas';
    [0,-24,-48].forEach(function(db) {
        ctx.fillText(db+'', 4, h - h * (db - DBMIN) / dbRange - 4);
    });

    // Trace
    if (targetDb.length > 0) {
        ctx.beginPath();
        ctx.strokeStyle = '#33ff33'; ctx.lineWidth = 2;
        ctx.shadowBlur = 4; ctx.shadowColor = '#33ff33';

        for (var i = 0; i < targetDb.length; i++) {
            currentDb[i] += (targetDb[i] - currentDb[i]) * 0.12;
            var x = w * (Math.log10(freqs[i]) - logMin) / logRange;
            var y = h - h * (Math.max(DBMIN, Math.min(DBMAX, currentDb[i])) - DBMIN) / dbRange;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke(); ctx.shadowBlur = 0;
    }

    requestAnimationFrame(draw);
}

// Poll for live response data
function poll() {
    fetch('/live-response').then(function(r) { return r.json(); }).then(function(d) {
        var j = JSON.stringify(d);
        if (j !== lastJson && d.freqs && d.freqs.length) {
            lastJson = j;
            freqs = d.freqs;
            targetDb = d.db;
            if (currentDb.length !== targetDb.length) currentDb = targetDb.slice();
            labelEl.textContent = d.label || '';
            statusEl.textContent = 'live';
        }
    }).catch(function() {
        statusEl.textContent = 'offline';
    });
    setTimeout(poll, 500);
}

draw();
poll();
</script></body></html>
