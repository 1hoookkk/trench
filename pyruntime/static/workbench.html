<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRENCH Workbench</title>
<style>
    /* A2K WORKBENCH AESTHETIC */
    :root {
        --a2k-bg: #aaaaaa;
        --a2k-border-light: #ffffff;
        --a2k-border-dark: #000000;
        --a2k-title-bg: #0000a0;
        --a2k-title-fg: #ffffff;
        --winamp-bg: #1c1c1c;
        --winamp-panel: #2a2a2a;
        --winamp-accent: #ff6600;
        --winamp-border-light: #555555;
        --winamp-border-dark: #0a0a0a;
        --scope-phosphor: #00ff00;
    }
    body {
        margin: 0; padding: 0; background: var(--a2k-bg);
        font-family: Arial, Helvetica, sans-serif; height: 100vh; overflow: hidden;
    }
    .window {
        position: absolute; background: var(--a2k-bg);
        border: 2px solid; border-color: var(--a2k-border-light) var(--a2k-border-dark) var(--a2k-border-dark) var(--a2k-border-light);
        box-shadow: 2px 2px 0px rgba(0,0,0,0.2); display: flex; flex-direction: column;
    }
    .title-bar {
        background: var(--a2k-title-bg); color: var(--a2k-title-fg);
        display: flex; justify-content: space-between; align-items: center;
        padding: 2px; font-weight: bold; font-size: 14px; cursor: move; user-select: none;
    }
    .title-icon { width: 14px; height: 14px; background: #fff; border: 1px solid #000; margin-right: 6px; }
    .title-text { flex-grow: 1; }
    .title-controls { display: flex; gap: 2px; }
    .title-btn {
        width: 16px; height: 16px; background: var(--a2k-bg); border: 1px solid var(--a2k-border-dark);
        border-color: var(--a2k-border-light) var(--a2k-border-dark) var(--a2k-border-dark) var(--a2k-border-light);
        cursor: pointer;
    }
    .title-btn:active { border-color: var(--a2k-border-dark) var(--a2k-border-light) var(--a2k-border-light) var(--a2k-border-dark); }
    .window-content { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }

    /* DESIGNER SPECIFICS */
    .designer-controls { display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; border-bottom: 2px solid #888; }
    .btn-a2k {
        background: var(--a2k-bg); border: 2px solid; padding: 4px 8px; font-weight: bold; cursor: pointer;
        border-color: var(--a2k-border-light) var(--a2k-border-dark) var(--a2k-border-dark) var(--a2k-border-light);
    }
    .btn-a2k:active, .btn-a2k.active { border-color: var(--a2k-border-dark) var(--a2k-border-light) var(--a2k-border-light) var(--a2k-border-dark); background: #999; }
    .row { display: flex; align-items: center; gap: 6px; background: #c0c0c0; padding: 4px; border: 1px inset #fff; }
    .row select, .row input[type="range"] { flex-grow: 1; }
    .val-readout { width: 40px; text-align: right; font-family: monospace; font-size: 12px; background: #fff; border: 1px solid #000; padding: 2px; }
    .row-actions { display: flex; gap: 2px; }

    /* SCOPE SPECIFICS */
    #scope-canvas { background: #0f111a; border: 2px inset #fff; width: 400px; height: 250px; }

    /* TRENCH WINAMP TRANSPORT */
    .winamp-skin {
        background: var(--winamp-bg); color: var(--winamp-accent); font-family: 'Courier New', Courier, monospace;
        border: 2px solid; border-color: var(--winamp-border-light) var(--winamp-border-dark) var(--winamp-border-dark) var(--winamp-border-light);
        padding: 10px; display: flex; flex-direction: column; gap: 12px;
        background-image: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,0.2) 1px, rgba(0,0,0,0.2) 2px);
    }
    .lcd-panel { background: #050505; border: 2px inset #444; padding: 6px; display: flex; justify-content: space-between; text-shadow: 0 0 5px var(--winamp-accent); }
    .lcd-group { display: flex; flex-direction: column; align-items: center; }
    .lcd-label { font-size: 10px; color: #888; }
    .lcd-val { font-size: 20px; font-weight: bold; }
    .transport-btns { display: flex; gap: 8px; justify-content: center; }
    .btn-winamp {
        background: var(--winamp-panel); color: #fff; font-weight: bold; font-size: 16px; padding: 8px 16px; border: 2px solid;
        border-color: var(--winamp-border-light) var(--winamp-border-dark) var(--winamp-border-dark) var(--winamp-border-light);
        cursor: pointer; text-transform: uppercase;
    }
    .btn-winamp:active, .btn-winamp.active-state {
        border-color: var(--winamp-border-dark) var(--winamp-border-light) var(--winamp-border-light) var(--winamp-border-dark);
        color: var(--winamp-accent); text-shadow: 0 0 5px var(--winamp-accent);
    }
    .btn-live { background: #4a1c00; border-color: #ff8800 #220000 #220000 #ff8800; color: #ff8800; }
    .btn-live:active { border-color: #220000 #ff8800 #ff8800 #220000; }
    .sliders-winamp { display: flex; gap: 10px; }
    .slider-group { flex-grow: 1; display: flex; flex-direction: column; font-size: 12px; }
    .slider-group input[type=range] { width: 100%; accent-color: var(--winamp-accent); }
    .status-line { background: #000; padding: 4px; font-size: 12px; border: 1px inset #444; height: 14px; overflow: hidden; }
</style>
</head>
<body>

<div class="window" style="left: 20px; top: 20px; width: 500px;" id="win-designer">
    <div class="title-bar"><div class="title-icon"></div><div class="title-text">DESIGNER</div><div class="title-controls"><div class="title-btn"></div></div></div>
    <div class="window-content">
        <div class="designer-controls">
            <div>
                <strong>EDIT TARGET: </strong>
                <button class="btn-a2k active" id="btn-edit-a" onclick="setEditTarget('A')">A</button>
                <button class="btn-a2k" id="btn-edit-b" onclick="setEditTarget('B')">B</button>
            </div>
            <button class="btn-a2k" onclick="triggerRender()">Force Render</button>
        </div>
        <div id="rows-container"></div>
    </div>
</div>

<div class="window" style="left: 20px; top: 380px; width: 500px;" id="win-sift">
    <div class="title-bar"><div class="title-icon"></div><div class="title-text">SIFT</div><div class="title-controls"><div class="title-btn"></div></div></div>
    <div class="window-content">
        <div style="display:flex; gap:6px; align-items:center;">
            <button class="btn-a2k" onclick="siftGenerate()" style="font-weight:bold">GENERATE 10</button>
            <span id="sift-counter" style="font-family:monospace; font-size:14px; font-weight:bold; min-width:80px;">0 / 0</span>
            <span id="sift-name" style="font-family:monospace; font-size:11px; flex:1; overflow:hidden;"></span>
        </div>
        <div style="display:flex; gap:6px; margin-top:6px;">
            <button class="btn-a2k" onclick="siftPrev()" style="font-size:16px; padding:6px 14px;">&#9664; PREV</button>
            <button class="btn-a2k" onclick="siftNext()" style="font-size:16px; padding:6px 14px;">NEXT &#9654;</button>
            <button class="btn-a2k" onclick="siftSave()" style="font-weight:bold; color:green;">S SAVE</button>
            <button class="btn-a2k" onclick="siftTrash()" style="font-weight:bold; color:red;">D TRASH</button>
        </div>
        <div class="status-line" id="sift-status" style="margin-top:6px; background:#000; color:#ff6600; font-family:monospace; padding:3px;">Arrow keys: cycle | S: save | D: trash</div>
    </div>
</div>

<div class="window" style="left: 540px; top: 20px;" id="win-scope">
    <div class="title-bar"><div class="title-icon"></div><div class="title-text">SCOPE</div><div class="title-controls"><div class="title-btn"></div></div></div>
    <div class="window-content">
        <canvas id="scope-canvas" width="400" height="250"></canvas>
    </div>
</div>

<div class="window" style="left: 540px; top: 320px; width: 420px;" id="win-transport">
    <div class="title-bar"><div class="title-icon"></div><div class="title-text">TRENCH Transport</div><div class="title-controls"><div class="title-btn"></div></div></div>
    <div class="window-content" style="padding: 0;">
        <div class="winamp-skin">
            <div class="lcd-panel">
                <div class="lcd-group"><span class="lcd-label">MORPH</span><span class="lcd-val" id="lcd-morph">000</span></div>
                <div class="lcd-group"><span class="lcd-label">Q</span><span class="lcd-val" id="lcd-q">050</span></div>
                <div class="lcd-group"><span class="lcd-label">DRIVE</span><span class="lcd-val" id="lcd-drive">000</span></div>
            </div>
            <div class="sliders-winamp">
                <div class="slider-group">
                    <label>MORPH</label>
                    <input type="range" id="sl-morph" min="0" max="100" value="0" oninput="updateTransport()" onchange="handleSliderRelease()">
                </div>
                <div class="slider-group">
                    <label>Q</label>
                    <input type="range" id="sl-q" min="0" max="100" value="50" oninput="updateTransport()" onchange="handleSliderRelease()">
                </div>
                <div class="slider-group">
                    <label>DRIVE (Mackie)</label>
                    <input type="range" id="sl-drive" min="0" max="100" value="0" oninput="updateTransport()" onchange="handleSliderRelease()">
                </div>
            </div>
            <div class="transport-btns">
                <button class="btn-winamp" id="btn-play" onclick="togglePlay()">PLAY</button>
                <button class="btn-winamp" onclick="panicStop()">STOP</button>
                <button class="btn-winamp btn-live" onclick="pushLive()">PUSH LIVE</button>
            </div>
            <div class="status-line" id="status-line">SYS OK</div>
        </div>
    </div>
</div>

<script>
    /* --- STATE --- */
    let editTarget = 'A';
    const TYPE_MAP = { 'OFF': 0, 'EQ': 2, 'LP': 1, 'HP': 3 };
    const grid = Array(6).fill(null).map(() => ({ type: 'OFF', freqA: 64, gainA: 64, freqB: 64, gainB: 64 }));
    let isPlaying = false;
    let audioCtx = null;
    let currentSource = null;

    let scopeTimer = null;
    let renderTimer = null;
    let renderAbortController = null;

    /* --- INIT & DOM --- */
    function init() {
        makeDraggable(document.getElementById('win-designer'));
        makeDraggable(document.getElementById('win-scope'));
        makeDraggable(document.getElementById('win-transport'));
        makeDraggable(document.getElementById('win-sift'));
        renderRows();
        drawEmptyScope();

        window.addEventListener('keydown', (e) => {
            if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
            if(e.code === 'Space') { e.preventDefault(); togglePlay(); }
            if(e.code === 'Enter') { e.preventDefault(); pushLive(); }
            if(e.code === 'Escape') { e.preventDefault(); panicStop(); }
            if(e.code === 'ArrowRight') { e.preventDefault(); siftNext(); }
            if(e.code === 'ArrowLeft') { e.preventDefault(); siftPrev(); }
            if(e.code === 'KeyS') { e.preventDefault(); siftSave(); }
            if(e.code === 'KeyD') { e.preventDefault(); siftTrash(); }
        });
    }

    function renderRows() {
        const container = document.getElementById('rows-container');
        container.innerHTML = '';
        grid.forEach((row, idx) => {
            const freqVal = editTarget === 'A' ? row.freqA : row.freqB;
            const gainVal = editTarget === 'A' ? row.gainA : row.gainB;

            const div = document.createElement('div');
            div.className = 'row';
            div.innerHTML = `
                <span style="width:12px; font-weight:bold">${idx+1}</span>
                <select onchange="updateRow(${idx}, 'type', this.value)">
                    <option value="OFF" ${row.type==='OFF'?'selected':''}>OFF</option>
                    <option value="LP" ${row.type==='LP'?'selected':''}>LP</option>
                    <option value="EQ" ${row.type==='EQ'?'selected':''}>EQ</option>
                    <option value="HP" ${row.type==='HP'?'selected':''}>HP</option>
                </select>
                <label>F</label>
                <input type="range" min="0" max="127" step="1" value="${freqVal}" oninput="updateRow(${idx}, 'freq', parseInt(this.value))" onchange="handleSliderRelease()">
                <div class="val-readout">${freqVal}</div>
                <label>G</label>
                <input type="range" min="0" max="127" step="1" value="${gainVal}" oninput="updateRow(${idx}, 'gain', parseInt(this.value))" onchange="handleSliderRelease()">
                <div class="val-readout">${gainVal}</div>
                <div class="row-actions">
                    <button class="btn-a2k" onclick="copyRow(${idx}, 'A', 'B')" title="Copy A->B">A>B</button>
                    <button class="btn-a2k" onclick="copyRow(${idx}, 'B', 'A')" title="Copy B->A">B>A</button>
                    <button class="btn-a2k" onclick="clearRow(${idx})" title="Clear">X</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    /* --- INTERACTIONS --- */
    function setEditTarget(target) {
        editTarget = target;
        document.getElementById('btn-edit-a').classList.toggle('active', target === 'A');
        document.getElementById('btn-edit-b').classList.toggle('active', target === 'B');
        renderRows();
    }

    function updateRow(idx, field, val) {
        if (field === 'type') grid[idx].type = val;
        else if (field === 'freq') { editTarget === 'A' ? grid[idx].freqA = val : grid[idx].freqB = val; }
        else if (field === 'gain') { editTarget === 'A' ? grid[idx].gainA = val : grid[idx].gainB = val; }

        if(field === 'freq' || field === 'gain') {
            const rowDiv = document.getElementById('rows-container').children[idx];
            const readouts = rowDiv.querySelectorAll('.val-readout');
            if(field === 'freq') readouts[0].innerText = val;
            if(field === 'gain') readouts[1].innerText = val;
        }
        scheduleScopeUpdate();
    }

    function copyRow(idx, from, to) {
        grid[idx][`freq${to}`] = grid[idx][`freq${from}`];
        grid[idx][`gain${to}`] = grid[idx][`gain${from}`];
        renderRows(); scheduleScopeUpdate(); handleSliderRelease();
    }

    function clearRow(idx) {
        grid[idx] = { type: 'OFF', freqA: 64, gainA: 64, freqB: 64, gainB: 64 };
        renderRows(); scheduleScopeUpdate(); handleSliderRelease();
    }

    function updateTransport() {
        const m = document.getElementById('sl-morph').value;
        const q = document.getElementById('sl-q').value;
        const d = document.getElementById('sl-drive').value;
        document.getElementById('lcd-morph').innerText = m.padStart(3, '0');
        document.getElementById('lcd-q').innerText = q.padStart(3, '0');
        document.getElementById('lcd-drive').innerText = d.padStart(3, '0');
        scheduleScopeUpdate();
    }

    function handleSliderRelease() {
        if (isPlaying) scheduleAudioRender();
    }

    function setStatus(msg) {
        document.getElementById('status-line').innerText = '> ' + msg;
    }

    /* --- PAYLOADS: translate grid → backend DesignerSectionInput schema --- */
    function gridToSections() {
        return grid.map(r => ({
            type: TYPE_MAP[r.type] || 0,
            low_freq: r.freqA,
            low_gain: r.gainA,
            high_freq: r.freqB,
            high_gain: r.gainB,
        }));
    }

    function getDesignerPayload() {
        return { name: 'workbench_live', sections: gridToSections() };
    }

    function getResponsePayload() {
        return {
            ...getDesignerPayload(),
            morph: parseInt(document.getElementById('sl-morph').value) / 100,
            q: parseInt(document.getElementById('sl-q').value) / 100,
        };
    }

    function getRenderPayload() {
        return {
            ...getDesignerPayload(),
            morph: parseInt(document.getElementById('sl-morph').value) / 100,
            q: parseInt(document.getElementById('sl-q').value) / 100,
            mackie_amount: parseInt(document.getElementById('sl-drive').value) / 100,
            duration: 2.0,
        };
    }

    /* --- API & AUDIO --- */
    function scheduleScopeUpdate() {
        clearTimeout(scopeTimer);
        scopeTimer = setTimeout(() => {
            fetch('/designer/response', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(getResponsePayload())
            })
            .then(r => r.json())
            .then(data => { if(data.freqs && data.db) drawScope(data.freqs, data.db); })
            .catch(e => setStatus('Scope API Error'));
        }, 100);
    }

    function scheduleAudioRender() {
        clearTimeout(renderTimer);
        if (renderAbortController) renderAbortController.abort();
        renderAbortController = new AbortController();

        renderTimer = setTimeout(() => {
            setStatus('Rendering audio...');
            fetch('/designer/render', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(getRenderPayload()),
                signal: renderAbortController.signal
            })
            .then(r => r.json())
            .then(data => {
                if(data.audio_b64) {
                    playBase64Audio(data.audio_b64);
                    setStatus('Playing loop.');
                }
            })
            .catch(e => {
                if (e.name !== 'AbortError') setStatus('Render API Error');
            });
        }, 200);
    }

    function togglePlay() {
        isPlaying = !isPlaying;
        const btn = document.getElementById('btn-play');
        if (isPlaying) {
            btn.classList.add('active-state');
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            scheduleAudioRender();
        } else {
            btn.classList.remove('active-state');
            panicStop();
        }
    }

    function panicStop() {
        isPlaying = false;
        document.getElementById('btn-play').classList.remove('active-state');
        clearTimeout(renderTimer);
        if(renderAbortController) renderAbortController.abort();
        if(currentSource) { currentSource.stop(); currentSource.disconnect(); currentSource = null; }
        setStatus('Playback stopped.');
    }

    function triggerRender() {
        if (!isPlaying) togglePlay();
        else scheduleAudioRender();
    }

    async function playBase64Audio(base64str) {
        if(currentSource) { currentSource.stop(); currentSource.disconnect(); }
        try {
            const binaryStr = window.atob(base64str);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
            const audioBuffer = await audioCtx.decodeAudioData(bytes.buffer);
            currentSource = audioCtx.createBufferSource();
            currentSource.buffer = audioBuffer;
            currentSource.loop = true;
            currentSource.connect(audioCtx.destination);
            currentSource.start(0);
        } catch (e) {
            setStatus('Audio Decode Error');
        }
    }

    function pushLive() {
        setStatus('Pushing to trench_live.json...');
        fetch('/designer/live', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(getDesignerPayload())
        })
        .then(r => r.json())
        .then(data => {
            if(data.status === 'ok') setStatus('LIVE PUSHED');
            else setStatus('PUSH FAILED');
        })
        .catch(e => setStatus('Live API Error'));
    }

    /* --- CANVAS DRAWING --- */
    function drawEmptyScope() { drawScope([20, 20000], [0, 0]); }
    function drawScope(freqs, dbs) {
        const cvs = document.getElementById('scope-canvas');
        const ctx = cvs.getContext('2d');
        const W = cvs.width; const H = cvs.height;
        ctx.fillStyle = '#0f111a';
        ctx.fillRect(0,0,W,H);

        ctx.strokeStyle = '#1a2a1a'; ctx.lineWidth = 1;
        for(let i=1; i<4; i++) { ctx.beginPath(); ctx.moveTo(0, H*(i/4)); ctx.lineTo(W, H*(i/4)); ctx.stroke(); }
        [100,1000,10000].forEach(f => {
            let x = ((Math.log10(f) - Math.log10(20)) / (Math.log10(20000) - Math.log10(20))) * W;
            ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
        });

        ctx.beginPath();
        ctx.strokeStyle = '#00ff00';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 3; ctx.shadowColor = '#00ff00';
        const minF = Math.log10(20); const maxF = Math.log10(20000);
        for(let i=0; i<freqs.length; i++) {
            let x = ((Math.log10(freqs[i]) - minF) / (maxF - minF)) * W;
            let y = H/2 - (dbs[i] * (H/60));
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    /* --- UTILS --- */
    function makeDraggable(el) {
        let pos1=0, pos2=0, pos3=0, pos4=0;
        const header = el.querySelector('.title-bar');
        header.onmousedown = dragMouseDown;
        function dragMouseDown(e) {
            e.preventDefault();
            pos3 = e.clientX; pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
            document.querySelectorAll('.window').forEach(w => w.style.zIndex = 1);
            el.style.zIndex = 2;
        }
        function elementDrag(e) {
            e.preventDefault();
            pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
            pos3 = e.clientX; pos4 = e.clientY;
            el.style.top = (el.offsetTop - pos2) + "px";
            el.style.left = (el.offsetLeft - pos1) + "px";
        }
        function closeDragElement() { document.onmouseup = null; document.onmousemove = null; }
    }

    /* --- SIFT (Tinder for DSP) --- */
    function updateSiftUI(data) {
        document.getElementById('sift-counter').innerText = (data.current + 1) + ' / ' + data.count;
        document.getElementById('sift-name').innerText = data.name || '';
    }

    function siftGenerate() {
        const sections = gridToSections();
        document.getElementById('sift-status').innerText = 'Generating...';
        fetch('/sift/generate', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ base_sections: sections, count: 10 })
        })
        .then(r => r.json())
        .then(data => {
            updateSiftUI(data);
            document.getElementById('sift-status').innerText = data.count + ' candidates ready. Arrow keys to cycle.';
            scheduleScopeFromLive();
        })
        .catch(e => { document.getElementById('sift-status').innerText = 'Generate failed'; });
    }

    function siftNext() {
        fetch('/sift/next', { method: 'POST' })
        .then(r => r.json())
        .then(data => { updateSiftUI(data); scheduleScopeFromLive(); })
        .catch(() => {});
    }

    function siftPrev() {
        fetch('/sift/prev', { method: 'POST' })
        .then(r => r.json())
        .then(data => { updateSiftUI(data); scheduleScopeFromLive(); })
        .catch(() => {});
    }

    function siftSave() {
        fetch('/sift/save', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            document.getElementById('sift-status').innerText = 'SAVED: ' + data.saved;
        })
        .catch(() => {});
    }

    function siftTrash() {
        fetch('/sift/trash', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            updateSiftUI(data);
            document.getElementById('sift-status').innerText = 'Trashed. ' + data.count + ' remaining.';
            scheduleScopeFromLive();
        })
        .catch(() => {});
    }

    function scheduleScopeFromLive() {
        // Read the current trench_live.json body and show its response on scope
        fetch('/live-response').then(r => r.json()).then(data => {
            if(data.freqs && data.freqs.length) drawScope(data.freqs, data.db);
        }).catch(() => {});
    }

    window.onload = init;
</script>
