<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TRENCH · Phoneme Atlas</title>
    <style>
      :root {
        --bg: #0a0a14;
        --panel: #101025;
        --panel2: #0e0e20;
        --text: #d6d6ff;
        --muted: #8d8db5;
        --grid: #1a1a2e;
        --accent: #00f0c8;
        --warn: #ffb020;
        --bad: #ff3b6b;
        --ok: #3aff7a;
        --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      html, body {
        height: 100%;
        margin: 0;
        background: radial-gradient(1200px 700px at 40% 0%, #0f0f2e, var(--bg));
        color: var(--text);
        font-family: var(--sans);
      }

      header {
        padding: 16px 18px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        background: linear-gradient(180deg, rgba(10,10,20,0.98), rgba(10,10,20,0.65));
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(8px);
      }

      .title {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .title h1 {
        font-size: 16px;
        letter-spacing: 0.08em;
        margin: 0;
        text-transform: uppercase;
      }
      .title .sub {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
      }

      .controls {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .controls label {
        color: var(--muted);
        font-size: 12px;
      }
      .controls input, .controls select {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 10px;
        outline: none;
      }
      .controls input::placeholder {
        color: rgba(214,214,255,0.45);
      }

      main {
        display: grid;
        grid-template-columns: 420px 1fr 420px;
        gap: 12px;
        padding: 12px;
      }

      .panel {
        background: linear-gradient(180deg, rgba(16,16,37,0.9), rgba(14,14,32,0.92));
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 14px;
        overflow: hidden;
        min-height: 240px;
      }

      .panel .ph {
        padding: 12px 14px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .panel .ph .name {
        font-family: var(--mono);
        font-size: 12px;
        color: rgba(214,214,255,0.92);
      }
      .panel .ph .hint {
        font-size: 12px;
        color: var(--muted);
      }

      .list {
        max-height: calc(100vh - 170px);
        overflow: auto;
      }

      .row {
        padding: 10px 14px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .row:hover { background: rgba(255,255,255,0.03); }
      .row.selected { outline: 2px solid rgba(0,240,200,0.18); background: rgba(0,240,200,0.05); }

      .k {
        font-family: var(--mono);
        font-size: 12px;
      }
      .meta {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .badge {
        font-family: var(--mono);
        font-size: 11px;
        border-radius: 999px;
        padding: 2px 8px;
        border: 1px solid rgba(255,255,255,0.12);
        color: rgba(214,214,255,0.85);
      }
      .badge.novel { border-color: rgba(255,59,107,0.45); color: rgba(255,146,178,0.95); }
      .badge.vowel { border-color: rgba(0,240,200,0.35); color: rgba(0,240,200,0.95); }

      table {
        width: 100%;
        border-collapse: collapse;
        font-family: var(--mono);
        font-size: 11px;
      }
      th, td {
        padding: 8px 10px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        white-space: nowrap;
      }
      th { color: rgba(214,214,255,0.72); text-align: left; position: sticky; top: 0; background: rgba(16,16,37,0.95); }
      td.muted { color: rgba(214,214,255,0.55); }
      tr:hover td { background: rgba(255,255,255,0.03); }
      .click { cursor: pointer; }

      .pill {
        display: inline-block;
        font-family: var(--mono);
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.10);
        color: rgba(214,214,255,0.80);
      }
      .pill.calm { border-color: rgba(58,255,122,0.30); color: rgba(58,255,122,0.95); }
      .pill.strained { border-color: rgba(255,176,32,0.35); color: rgba(255,176,32,0.95); }
      .pill.violent { border-color: rgba(255,59,107,0.45); color: rgba(255,59,107,0.95); }

      .mono { font-family: var(--mono); }
      .dim { color: rgba(214,214,255,0.55); }
      .empty { padding: 14px; color: rgba(214,214,255,0.65); }
      a { color: var(--accent); text-decoration: none; }
    </style>
  </head>

  <body>
    <header>
      <div class="title">
        <h1>Phoneme Atlas</h1>
        <div class="sub" id="subline">loading…</div>
      </div>
      <div class="controls">
        <label>Search</label>
        <input id="search" placeholder="PH_027 or 'novel'" />
        <label>Sort</label>
        <select id="sort">
          <option value="count_desc">count ↓</option>
          <option value="count_asc">count ↑</option>
          <option value="key_asc">key ↑</option>
          <option value="key_desc">key ↓</option>
        </select>
        <label>Show</label>
        <select id="show">
          <option value="all">all</option>
          <option value="novel">novel only</option>
          <option value="known">known-ish only</option>
        </select>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="ph">
          <div class="name">PHONEMES</div>
          <div class="hint" id="countHint">—</div>
        </div>
        <div class="list" id="phonemeList"></div>
      </section>

      <section class="panel">
        <div class="ph">
          <div class="name" id="midTitle">SELECT A PHONEME</div>
          <div class="hint" id="midHint">—</div>
        </div>
        <div id="atlasPane" class="list">
          <div class="empty">Pick a phoneme cluster on the left to see its member corners.</div>
        </div>
      </section>

      <section class="panel">
        <div class="ph">
          <div class="name" id="rightTitle">SELECT A BODY</div>
          <div class="hint" id="rightHint">—</div>
        </div>
        <div id="bodyPane" class="list">
          <div class="empty">Click an id in the center table to view its 4-corner tags.</div>
        </div>
      </section>
    </main>

    <script>
      const state = {
        inventory: null,
        selectedPhoneme: null,
        selectedBody: null,
        atlasCache: new Map(),
        bodyCache: new Map(),
      };

      const $ = (id) => document.getElementById(id);

      function pillStress(stress) {
        const s = String(stress || "calm");
        return `<span class="pill ${s}">${s}</span>`;
      }

      function escapeHtml(s) {
        return String(s || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;");
      }

      function topVowelBadge(vowelVotes) {
        if (!vowelVotes || typeof vowelVotes !== "object") return "";
        let best = null;
        for (const [k, v] of Object.entries(vowelVotes)) {
          const n = Number(v) || 0;
          if (!best || n > best.n) best = { k, n };
        }
        if (!best || best.n <= 0) return "";
        return `<span class="badge vowel">${escapeHtml(best.k)}×${best.n}</span>`;
      }

      function renderPhonemeList() {
        const inv = state.inventory;
        const box = $("phonemeList");
        if (!inv) { box.innerHTML = `<div class="empty">No inventory loaded.</div>`; return; }
        const phonemes = inv.phonemes || {};
        const query = $("search").value.trim().toLowerCase();
        const sort = $("sort").value;
        const show = $("show").value;

        let rows = Object.entries(phonemes).map(([key, meta]) => ({
          key,
          count: Number(meta.count) || 0,
          novel: Boolean(meta.novel),
          vowelVotes: meta.vowel_votes || {},
          reps: meta.representatives || [],
        }));

        rows = rows.filter((r) => {
          if (show === "novel" && !r.novel) return false;
          if (show === "known" && r.novel) return false;
          if (!query) return true;
          if (r.key.toLowerCase().includes(query)) return true;
          if (query === "novel") return r.novel;
          return false;
        });

        if (sort === "count_desc") rows.sort((a,b) => b.count - a.count);
        if (sort === "count_asc") rows.sort((a,b) => a.count - b.count);
        if (sort === "key_asc") rows.sort((a,b) => a.key.localeCompare(b.key));
        if (sort === "key_desc") rows.sort((a,b) => b.key.localeCompare(a.key));

        $("countHint").textContent = `${rows.length} shown`;

        box.innerHTML = rows.map((r) => {
          const sel = (state.selectedPhoneme === r.key) ? "row selected" : "row";
          const novel = r.novel ? `<span class="badge novel">NOVEL</span>` : "";
          const vowel = topVowelBadge(r.vowelVotes);
          return `
            <div class="${sel}" data-key="${escapeHtml(r.key)}">
              <div>
                <div class="k">${escapeHtml(r.key)}</div>
                <div class="meta"><span>${r.count} corners</span>${novel}${vowel}</div>
              </div>
              <div class="meta dim">${r.reps && r.reps.length ? escapeHtml(r.reps[0].id) : ""}</div>
            </div>
          `;
        }).join("");

        for (const el of box.querySelectorAll(".row")) {
          el.addEventListener("click", () => {
            const key = el.getAttribute("data-key");
            if (!key) return;
            selectPhoneme(key);
          });
        }
      }

      async function fetchJson(url) {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        return await res.json();
      }

      async function selectPhoneme(key) {
        state.selectedPhoneme = key;
        state.selectedBody = null;
        $("rightTitle").textContent = "SELECT A BODY";
        $("rightHint").textContent = "—";
        $("bodyPane").innerHTML = `<div class="empty">Click an id in the center table to view its 4-corner tags.</div>`;
        renderPhonemeList();

        $("midTitle").textContent = key;
        $("midHint").textContent = "loading…";

        let data = state.atlasCache.get(key);
        if (!data) {
          data = await fetchJson(`/phonemes/atlas/${encodeURIComponent(key)}`);
          state.atlasCache.set(key, data);
        }
        renderAtlas(data.records || []);
      }

      function renderAtlas(records) {
        $("midHint").textContent = `${records.length} corners`;
        const box = $("atlasPane");
        if (!records.length) {
          box.innerHTML = `<div class="empty">No records for this phoneme.</div>`;
          return;
        }

        const rows = records.slice().sort((a,b) => {
          // sort: violent first, then strained, then calm
          const o = { violent: 0, strained: 1, calm: 2 };
          const da = o[a.stress] ?? 3;
          const db = o[b.stress] ?? 3;
          return da - db;
        });

        box.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>id</th>
                <th>name</th>
                <th>corner</th>
                <th>band</th>
                <th>stress</th>
                <th>range</th>
                <th>peak</th>
                <th>centroid</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((r) => {
                const resp = r.response || {};
                const range = (resp.dynamic_range_db !== undefined) ? `${Number(resp.dynamic_range_db).toFixed(1)}dB` : "—";
                const peak = (resp.peak_db !== undefined) ? `${Number(resp.peak_db).toFixed(1)}dB` : "—";
                const cen = (resp.centroid_hz !== undefined) ? `${Number(resp.centroid_hz).toFixed(0)}Hz` : "—";
                return `
                  <tr>
                    <td class="click" data-id="${escapeHtml(r.id)}">${escapeHtml(r.id)}</td>
                    <td class="muted">${escapeHtml(r.filter_name || "")}</td>
                    <td>${escapeHtml(r.corner)}</td>
                    <td>${escapeHtml(r.mouth_band)}</td>
                    <td>${pillStress(r.stress)}</td>
                    <td>${range}</td>
                    <td>${peak}</td>
                    <td>${cen}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        `;

        for (const el of box.querySelectorAll("td.click")) {
          el.addEventListener("click", () => {
            const id = el.getAttribute("data-id");
            if (!id) return;
            selectBody(id);
          });
        }
      }

      async function selectBody(id) {
        state.selectedBody = id;
        $("rightTitle").textContent = id;
        $("rightHint").textContent = "loading…";

        let data = state.bodyCache.get(id);
        if (!data) {
          data = await fetchJson(`/phonemes/body/${encodeURIComponent(id)}`);
          state.bodyCache.set(id, data);
        }
        renderBody(data.records || []);
      }

      function renderBody(records) {
        $("rightHint").textContent = `${records.length} corners`;
        const box = $("bodyPane");
        if (!records.length) {
          box.innerHTML = `<div class="empty">No corners found for ${escapeHtml(state.selectedBody)}.</div>`;
          return;
        }
        const order = { "M0_Q0": 0, "M0_Q100": 1, "M100_Q0": 2, "M100_Q100": 3 };
        records = records.slice().sort((a,b) => (order[a.corner] ?? 9) - (order[b.corner] ?? 9));
        box.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>corner</th>
                <th>band</th>
                <th>stress</th>
                <th>range</th>
                <th>peak</th>
                <th>notch</th>
              </tr>
            </thead>
            <tbody>
              ${records.map((r) => {
                const resp = r.response || {};
                const range = (resp.dynamic_range_db !== undefined) ? `${Number(resp.dynamic_range_db).toFixed(1)}dB` : "—";
                const peak = (resp.peak_db !== undefined) ? `${Number(resp.peak_db).toFixed(1)}dB` : "—";
                const notch = (resp.notch_db !== undefined) ? `${Number(resp.notch_db).toFixed(1)}dB` : "—";
                return `
                  <tr>
                    <td>${escapeHtml(r.corner)}</td>
                    <td>${escapeHtml(r.mouth_band)}</td>
                    <td>${pillStress(r.stress)}</td>
                    <td>${range}</td>
                    <td>${peak}</td>
                    <td>${notch}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
          <div class="empty dim">
            Tip: this page is intentionally “numbers-light” — it’s a module browser.
            Use the atlas to name clusters, then wire those names into your authoring UI.
          </div>
        `;
      }

      async function boot() {
        try {
          const inv = await fetchJson("/phonemes/inventory");
          state.inventory = inv;
          const n = Object.keys(inv.phonemes || {}).length;
          $("subline").textContent = `${n} blanket phonemes · click to browse`;
          renderPhonemeList();
        } catch (e) {
          $("subline").textContent = `error loading inventory: ${e}`;
          $("phonemeList").innerHTML = `<div class="empty">Failed to load /phonemes/inventory</div>`;
        }
      }

      $("search").addEventListener("input", renderPhonemeList);
      $("sort").addEventListener("change", renderPhonemeList);
      $("show").addEventListener("change", renderPhonemeList);
      boot();
    </script>
  </body>
</html>
