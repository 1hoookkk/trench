<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TRENCH · Vault Lab</title>
    <style>
      :root {
        --bg: #0a0a14;
        --panel: #101025;
        --panel2: #0e0e20;
        --text: #d6d6ff;
        --muted: #8d8db5;
        --grid: #1a1a2e;
        --accent: #00f0c8;
        --warn: #ffb020;
        --bad: #ff3b6b;
        --ok: #3aff7a;
        --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      html, body {
        height: 100%;
        margin: 0;
        background: radial-gradient(1200px 700px at 40% 0%, #0f0f2e, var(--bg));
        color: var(--text);
        font-family: var(--sans);
      }

      header {
        padding: 16px 18px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        background: linear-gradient(180deg, rgba(10,10,20,0.98), rgba(10,10,20,0.65));
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(8px);
      }

      .title {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .title h1 {
        font-size: 16px;
        letter-spacing: 0.08em;
        margin: 0;
        text-transform: uppercase;
      }
      .title .sub {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
      }

      .controls {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .controls label {
        color: var(--muted);
        font-size: 12px;
      }
      .controls input {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 10px;
        outline: none;
        min-width: 220px;
      }
      .controls input::placeholder {
        color: rgba(214,214,255,0.45);
      }

      main {
        display: grid;
        grid-template-columns: 380px 1fr 420px;
        gap: 12px;
        padding: 12px;
      }

      .panel {
        background: linear-gradient(180deg, rgba(16,16,37,0.9), rgba(14,14,32,0.92));
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 14px;
        overflow: hidden;
        min-height: 240px;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .panel .ph {
        padding: 12px 14px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .panel .ph .name {
        font-family: var(--mono);
        font-size: 12px;
        color: rgba(214,214,255,0.92);
      }
      .panel .ph .hint {
        font-size: 12px;
        color: var(--muted);
        font-family: var(--mono);
      }

      .list {
        overflow: auto;
        padding: 10px 10px 14px;
        max-height: calc(100vh - 190px);
      }

      details.dir {
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 10px;
        margin-bottom: 8px;
        background: rgba(255,255,255,0.02);
      }
      details.dir > summary {
        cursor: pointer;
        padding: 8px 10px;
        font-family: var(--mono);
        font-size: 12px;
        color: rgba(214,214,255,0.90);
        list-style: none;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      details.dir > summary::-webkit-details-marker { display: none; }
      .dir-children { padding: 8px 10px 10px; border-top: 1px solid rgba(255,255,255,0.06); }

      .file {
        padding: 8px 10px;
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 10px;
        margin-bottom: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        background: rgba(255,255,255,0.01);
      }
      .file:hover { background: rgba(255,255,255,0.03); }
      .file.selected { outline: 2px solid rgba(0,240,200,0.18); background: rgba(0,240,200,0.05); }
      .file .fname { font-family: var(--mono); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .file .fmeta { font-family: var(--mono); font-size: 10px; color: rgba(214,214,255,0.55); }

      .kv {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 8px 10px;
        font-family: var(--mono);
        font-size: 11px;
        padding: 12px 14px;
      }
      .kv .k { color: rgba(214,214,255,0.60); }
      .kv .v { color: rgba(214,214,255,0.92); overflow: hidden; text-overflow: ellipsis; }

      .actions {
        padding: 12px 14px 14px;
        border-top: 1px solid rgba(255,255,255,0.06);
        display: grid;
        gap: 10px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .row label {
        font-size: 12px;
        color: var(--muted);
        font-family: var(--mono);
      }

      .btns { display: flex; gap: 8px; flex-wrap: wrap; }
      button {
        appearance: none;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.03);
        color: var(--text);
        border-radius: 12px;
        padding: 8px 10px;
        font-family: var(--mono);
        font-size: 11px;
        cursor: pointer;
      }
      button:hover { border-color: rgba(0,240,200,0.35); }
      button.primary { border-color: rgba(0,240,200,0.45); background: rgba(0,240,200,0.08); }
      button.danger { border-color: rgba(255,59,107,0.45); background: rgba(255,59,107,0.08); }
      button:disabled { opacity: 0.45; cursor: not-allowed; }

      .sliders {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .slider {
        display: grid;
        grid-template-columns: 72px 1fr 54px;
        gap: 10px;
        align-items: center;
        font-family: var(--mono);
        font-size: 11px;
      }
      .slider input[type="range"] {
        width: 100%;
      }
      .slider .val {
        text-align: right;
        color: rgba(214,214,255,0.85);
      }

      .status {
        font-family: var(--mono);
        font-size: 11px;
        color: rgba(214,214,255,0.65);
        min-height: 16px;
      }
      .status.ok { color: rgba(58,255,122,0.95); }
      .status.bad { color: rgba(255,59,107,0.95); }
      .status.warn { color: rgba(255,176,32,0.95); }

      canvas {
        width: 100%;
        height: 340px;
        display: block;
        background: rgba(0,0,0,0.12);
        border-top: 1px solid rgba(255,255,255,0.06);
      }

      audio {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="title">
        <h1>Vault Lab</h1>
        <div class="sub" id="subline">loading…</div>
      </div>
      <div class="controls">
        <label>Filter</label>
        <input id="filter" placeholder="type to filter (e.g. vocal_pack, Small_Talk, Cul_De_Sac…)" />
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="ph">
          <div class="name">VAULT</div>
          <div class="hint" id="vaultHint">—</div>
        </div>
        <div class="list" id="tree"></div>
      </section>

      <section class="panel">
        <div class="ph">
          <div class="name" id="midTitle">SELECT A BODY</div>
          <div class="hint" id="midHint">—</div>
        </div>
        <div style="flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column;">
          <div id="details" class="kv">
            <div class="k">tip</div>
            <div class="v">Select a JSON under `vault/` to preview + hotload.</div>
          </div>
          <canvas id="plot" width="1200" height="520"></canvas>
        </div>
      </section>

      <section class="panel">
        <div class="ph">
          <div class="name">AUDITION</div>
          <div class="hint" id="audHint">—</div>
        </div>
        <div class="list" style="padding: 12px 14px 0;">
          <div class="btns">
            <button id="corner_m0q0">M0_Q0</button>
            <button id="corner_m0q1">M0_Q100</button>
            <button id="corner_m1q0">M100_Q0</button>
            <button id="corner_m1q1">M100_Q100</button>
            <button id="corner_mid" class="primary">MID</button>
          </div>
          <div style="height: 10px"></div>
          <div class="sliders">
            <div class="slider">
              <div>MORPH</div>
              <input id="morph" type="range" min="0" max="1" step="0.01" value="0.50" />
              <div class="val" id="morphVal">0.50</div>
            </div>
            <div class="slider">
              <div>Q</div>
              <input id="q" type="range" min="0" max="1" step="0.01" value="0.50" />
              <div class="val" id="qVal">0.50</div>
            </div>
            <div class="slider">
              <div>SEC</div>
              <input id="dur" type="range" min="0.25" max="3.0" step="0.05" value="1.25" />
              <div class="val" id="durVal">1.25</div>
            </div>
          </div>
          <div style="height: 12px"></div>
          <div class="btns">
            <button id="btnPlot">Plot</button>
            <button id="btnPlay" class="primary">Render + Play</button>
            <button id="btnPush" class="danger">Push Live</button>
          </div>
          <div style="height: 10px"></div>
          <div class="status" id="status">—</div>
          <div style="height: 10px"></div>
          <audio id="player" controls></audio>
        </div>
      </section>
    </main>

    <script>
      const state = {
        catalog: null,
        selectedPath: null,
        selectedBody: null,
        selectedPreview: null,
      };

      const $ = (id) => document.getElementById(id);

      function escapeHtml(s) {
        return String(s || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;");
      }

      async function fetchJson(url, init) {
        const res = await fetch(url, { cache: "no-store", ...(init || {}) });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        return await res.json();
      }

      function status(text, kind) {
        const el = $("status");
        el.textContent = text;
        el.className = "status" + (kind ? (" " + kind) : "");
      }

      function matchesFilter(node, query) {
        if (!query) return true;
        const q = query.toLowerCase();
        const name = String(node.name || "").toLowerCase();
        const rel = String(node.relative_path || "").toLowerCase();
        return name.includes(q) || rel.includes(q);
      }

      function nodeToHtml(node, query) {
        if (!node) return "";
        if (node.type === "dir") {
          const children = (node.children || []).map((c) => nodeToHtml(c, query)).filter(Boolean).join("");
          if (!children && query && !matchesFilter(node, query)) return "";
          const sum = node.summary ? `<span class="fmeta">${escapeHtml(node.summary?.count || "")}</span>` : `<span class="fmeta">dir</span>`;
          return `
            <details class="dir" open>
              <summary>
                <span>${escapeHtml(node.name)}</span>
                ${sum}
              </summary>
              <div class="dir-children">${children || `<div class="file" style="opacity:0.6; cursor:default;"><span class="fname">empty</span><span class="fmeta">—</span></div>`}</div>
            </details>
          `;
        }
        if (node.type === "file") {
          if (!matchesFilter(node, query)) return "";
          if (node.ext !== ".json") return "";
          const sel = (state.selectedPath === node.relative_path) ? "file selected" : "file";
          return `
            <div class="${sel}" data-path="${escapeHtml(node.relative_path)}">
              <span class="fname">${escapeHtml(node.name)}</span>
              <span class="fmeta">${Math.round((node.size || 0) / 1024)}kb</span>
            </div>
          `;
        }
        return "";
      }

      function renderTree() {
        const box = $("tree");
        if (!state.catalog) {
          box.innerHTML = `<div class="file" style="opacity:0.7; cursor:default;"><span class="fname">no catalog loaded</span><span class="fmeta">—</span></div>`;
          return;
        }
        const query = $("filter").value.trim();
        const html = (state.catalog.children || []).map((c) => nodeToHtml(c, query)).filter(Boolean).join("");
        box.innerHTML = html || `<div class="file" style="opacity:0.7; cursor:default;"><span class="fname">no matches</span><span class="fmeta">—</span></div>`;

        for (const el of box.querySelectorAll(".file[data-path]")) {
          el.addEventListener("click", () => {
            const p = el.getAttribute("data-path");
            if (!p) return;
            selectPath(p);
          });
        }
      }

      function setSlider(id, value) {
        const el = $(id);
        el.value = String(value);
        $(id + "Val").textContent = Number(el.value).toFixed(2);
      }

      function bindSliders() {
        for (const id of ["morph", "q", "dur"]) {
          $(id).addEventListener("input", () => {
            $(id + "Val").textContent = Number($(id).value).toFixed(2);
          });
        }
      }

      function drawPlot(freqs, db) {
        const canvas = $("plot");
        const ctx = canvas.getContext("2d");
        const W = canvas.width;
        const H = canvas.height;

        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fillRect(0, 0, W, H);

        if (!freqs || !freqs.length || !db || !db.length) {
          ctx.fillStyle = "rgba(214,214,255,0.55)";
          ctx.font = "14px " + getComputedStyle(document.documentElement).getPropertyValue("--mono");
          ctx.fillText("no response", 18, 28);
          return;
        }

        const DBMIN = -60;
        const DBMAX = 60;
        const FMIN = Math.log10(20);
        const FMAX = Math.log10(19500);
        const FR = FMAX - FMIN;

        // Grid
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.lineWidth = 1;
        for (let i = 0; i <= 10; i++) {
          const y = (H * i) / 10;
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }

        // Downsample for visual sanity
        const step = Math.max(1, Math.floor(freqs.length / 700));

        // Filled wash under curve
        ctx.beginPath();
        for (let i = 0; i < freqs.length; i += step) {
          const f = freqs[i];
          const x = W * (Math.log10(f) - FMIN) / FR;
          const d = Math.max(DBMIN, Math.min(DBMAX, db[i]));
          const y = H - H * (d - DBMIN) / (DBMAX - DBMIN);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H);
        ctx.lineTo(0, H);
        ctx.closePath();
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0.00, "rgba(0,240,200,0.00)");
        grad.addColorStop(0.35, "rgba(0,240,200,0.12)");
        grad.addColorStop(1.00, "rgba(0,240,200,0.00)");
        ctx.fillStyle = grad;
        ctx.fill();

        // Curve
        ctx.beginPath();
        for (let i = 0; i < freqs.length; i += step) {
          const f = freqs[i];
          const x = W * (Math.log10(f) - FMIN) / FR;
          const d = Math.max(DBMIN, Math.min(DBMAX, db[i]));
          const y = H - H * (d - DBMIN) / (DBMAX - DBMIN);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = "rgba(0,240,200,0.95)";
        ctx.lineWidth = 2.0;
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(0,240,200,0.55)";
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      async function selectPath(relativePath) {
        state.selectedPath = relativePath;
        state.selectedBody = null;
        state.selectedPreview = null;
        $("midTitle").textContent = relativePath.split("/").pop() || "SELECT A BODY";
        $("midHint").textContent = "loading…";
        status("loading…");
        renderTree();

        try {
          const data = await fetchJson(`/vault/file?relative_path=${encodeURIComponent(relativePath)}`);
          if (data.type !== "json") {
            throw new Error("not a json body");
          }
          state.selectedBody = data.data;
          state.selectedPreview = data.preview || {};
          $("midHint").textContent = (state.selectedPreview.format || "json") + " · " + (state.selectedPreview.provenance || "—");
          renderDetails();
          await doPlot();
          status("ready", "ok");
        } catch (e) {
          $("midHint").textContent = "load failed";
          status(String(e), "bad");
          renderDetails();
          drawPlot([], []);
        }
      }

      function renderDetails() {
        const box = $("details");
        if (!state.selectedPath || !state.selectedPreview) {
          box.innerHTML = `
            <div class="k">tip</div>
            <div class="v">Select a JSON under <span style="color:var(--accent)">vault/</span> to preview + hotload.</div>
          `;
          $("btnPlay").disabled = true;
          $("btnPush").disabled = true;
          $("btnPlot").disabled = true;
          $("audHint").textContent = "—";
          return;
        }
        $("btnPlay").disabled = false;
        $("btnPush").disabled = false;
        $("btnPlot").disabled = false;
        $("audHint").textContent = state.selectedPreview.name || (state.selectedPath.split("/").pop() || "");

        const prev = state.selectedPreview || {};
        const labels = Array.isArray(prev.labels) ? prev.labels.join(", ") : "";
        const counts = Array.isArray(prev.stage_counts) ? prev.stage_counts.join(", ") : "";
        box.innerHTML = `
          <div class="k">relative_path</div><div class="v">${escapeHtml(state.selectedPath)}</div>
          <div class="k">name</div><div class="v">${escapeHtml(prev.name || "")}</div>
          <div class="k">format</div><div class="v">${escapeHtml(prev.format || "")}</div>
          <div class="k">provenance</div><div class="v">${escapeHtml(prev.provenance || "")}</div>
          <div class="k">labels</div><div class="v">${escapeHtml(labels)}</div>
          <div class="k">stages</div><div class="v">${escapeHtml(counts)}</div>
        `;
      }

      function currentParams() {
        return {
          morph: Number($("morph").value),
          q: Number($("q").value),
          duration: Number($("dur").value),
        };
      }

      async function doPlot() {
        if (!state.selectedBody) return;
        const p = currentParams();
        const resp = await fetchJson("/response", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ body: state.selectedBody, morph: p.morph, q: p.q }),
        });
        drawPlot(resp.freqs || [], resp.db || []);
      }

      async function doRenderAndPlay() {
        if (!state.selectedBody) return;
        const p = currentParams();
        status("rendering…");
        const out = await fetchJson("/render", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ body: state.selectedBody, morph: p.morph, q: p.q, duration: p.duration }),
        });
        const audio = $("player");
        audio.src = "data:audio/wav;base64," + (out.audio_b64 || "");
        try { await audio.play(); } catch (_) {}
        status(`peak ${out.peak_db} dB · ${out.samples} samples`, "ok");
      }

      async function doPushLive() {
        if (!state.selectedPath) return;
        status("pushing live…");
        const out = await fetchJson("/vault/push-live", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ relative_path: state.selectedPath }),
        });
        status(`LIVE: ${out.name || "ok"} (${out.format || "json"})`, "ok");
      }

      function bindCorners() {
        $("corner_m0q0").addEventListener("click", () => { setSlider("morph", 0.0); setSlider("q", 0.0); });
        $("corner_m0q1").addEventListener("click", () => { setSlider("morph", 0.0); setSlider("q", 1.0); });
        $("corner_m1q0").addEventListener("click", () => { setSlider("morph", 1.0); setSlider("q", 0.0); });
        $("corner_m1q1").addEventListener("click", () => { setSlider("morph", 1.0); setSlider("q", 1.0); });
        $("corner_mid").addEventListener("click", () => { setSlider("morph", 0.5); setSlider("q", 0.5); });
      }

      async function boot() {
        bindSliders();
        bindCorners();
        $("filter").addEventListener("input", renderTree);
        $("btnPlot").addEventListener("click", async () => { try { await doPlot(); status("plotted", "ok"); } catch (e) { status(String(e), "bad"); }});
        $("btnPlay").addEventListener("click", async () => { try { await doRenderAndPlay(); } catch (e) { status(String(e), "bad"); }});
        $("btnPush").addEventListener("click", async () => { try { await doPushLive(); } catch (e) { status(String(e), "bad"); }});

        $("btnPlay").disabled = true;
        $("btnPush").disabled = true;
        $("btnPlot").disabled = true;

        try {
          const cat = await fetchJson("/vault/catalog");
          state.catalog = cat;
          $("subline").textContent = "browse + render + push live · no git · no friction";
          $("vaultHint").textContent = escapeHtml(cat.root || "vault");
          renderTree();
          renderDetails();
          drawPlot([], []);
        } catch (e) {
          $("subline").textContent = "failed to load /vault/catalog";
          status(String(e), "bad");
        }
      }

      boot();
    </script>
  </body>
</html>
