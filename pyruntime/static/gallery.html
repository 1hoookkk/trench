<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENCH — BODY GALLERY</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --card: #222;
            --card-pass: #1a2a1a;
            --card-fail: #2a1a1a;
            --text: #ccc;
            --muted: #666;
            --pass: #4c4;
            --fail: #c44;
            --keep: #48f;
            --border: #333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font: 12px/1.4 'Courier New', monospace;
            padding: 12px;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 14px; color: #fff; }
        .header .stats { font-size: 11px; color: var(--muted); }
        .dir-list {
            display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
        }
        .dir-btn {
            font: bold 11px 'Courier New', monospace;
            padding: 4px 10px; cursor: pointer;
            background: var(--card); color: var(--text);
            border: 1px solid var(--border);
        }
        .dir-btn:hover { border-color: var(--keep); color: #fff; }
        .dir-btn.active { border-color: var(--keep); background: #1a2a4a; color: #fff; }
        .dir-btn .count { color: var(--muted); font-weight: normal; }
        .controls {
            display: flex; gap: 12px; align-items: center;
            margin-bottom: 12px; padding: 6px 0;
        }
        .controls label { font-size: 11px; color: var(--muted); }
        .controls select, .controls input {
            font: 11px 'Courier New', monospace;
            background: var(--card); color: var(--text);
            border: 1px solid var(--border); padding: 2px 4px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 8px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px;
            position: relative;
        }
        .card.pass { background: var(--card-pass); border-color: #2a4a2a; }
        .card.fail { background: var(--card-fail); border-color: #4a2a2a; }
        .card.kept { border-color: var(--keep); border-width: 2px; }
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 4px;
        }
        .card-name { font-weight: bold; font-size: 11px; color: #fff; }
        .card-badge {
            font-size: 10px; font-weight: bold; padding: 1px 6px;
        }
        .card-badge.pass { color: var(--pass); }
        .card-badge.fail { color: var(--fail); }
        .card-stats {
            font-size: 10px; color: var(--muted); margin-bottom: 4px;
        }
        .card canvas {
            width: 100%; height: 120px;
            background: #0a0a0a;
            border: 1px solid #333;
        }
        .card-actions {
            display: flex; gap: 6px; margin-top: 6px;
        }
        .card-actions button {
            font: bold 10px 'Courier New', monospace;
            padding: 3px 10px; cursor: pointer;
            border: 1px solid var(--border);
            background: var(--card); color: var(--text);
        }
        .card-actions .keep-btn { color: var(--keep); border-color: var(--keep); }
        .card-actions .keep-btn:hover { background: #1a2a4a; }
        .card-actions .reject-btn { color: var(--fail); }
        .card-actions .reject-btn:hover { background: #2a1a1a; }
        .hidden { display: none; }
        .loading {
            text-align: center; padding: 40px;
            color: var(--muted); font-size: 13px;
        }
        .sort-group { display: flex; gap: 4px; }
        .sort-btn {
            font: 10px 'Courier New', monospace;
            padding: 2px 8px; cursor: pointer;
            background: var(--card); color: var(--muted);
            border: 1px solid var(--border);
        }
        .sort-btn.active { color: #fff; border-color: var(--keep); }
        .filter-group { display: flex; gap: 8px; align-items: center; }
    </style>
</head>
<body>

<div class="header">
    <h1>TRENCH BODY GALLERY</h1>
    <div class="stats" id="stats">Select a directory</div>
</div>

<div class="dir-list" id="dir-list">
    <div class="loading">Loading directories...</div>
</div>

<div class="controls hidden" id="controls">
    <div class="filter-group">
        <label>Show:</label>
        <select id="filter-gate" onchange="applyFilter()">
            <option value="all">All</option>
            <option value="pass">Pass only</option>
            <option value="fail">Fail only</option>
        </select>
    </div>
    <div class="sort-group">
        <label style="margin-right:4px">Sort:</label>
        <button class="sort-btn active" data-sort="name" onclick="setSort('name')">Name</button>
        <button class="sort-btn" data-sort="peak" onclick="setSort('peak')">Peak</button>
        <button class="sort-btn" data-sort="morph" onclick="setSort('morph')">Morph</button>
    </div>
</div>

<div class="grid" id="grid"></div>

<script>
const API = '';
let allBodies = [];
let freqs = [];
let currentDir = '';
let currentSort = 'name';
let keptSet = new Set();

// ====================================================================
// INIT: load directories
// ====================================================================
async function init() {
    const resp = await fetch(API + '/gallery/scan');
    const data = await resp.json();
    const list = document.getElementById('dir-list');
    list.innerHTML = '';
    data.directories.forEach(d => {
        const btn = document.createElement('button');
        btn.className = 'dir-btn';
        btn.innerHTML = `${d.name} <span class="count">(${d.count})</span>`;
        btn.onclick = () => loadDirectory(d.name, btn);
        list.appendChild(btn);
    });
}

async function loadDirectory(name, btn) {
    document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    currentDir = name;

    document.getElementById('grid').innerHTML = '<div class="loading">Scanning bodies...</div>';
    document.getElementById('controls').classList.remove('hidden');
    document.getElementById('stats').textContent = `Loading ${name}...`;

    const resp = await fetch(API + `/gallery/scan?directory=${encodeURIComponent(name)}`);
    const data = await resp.json();
    allBodies = data.bodies;
    freqs = data.freqs;

    document.getElementById('stats').textContent =
        `${name}: ${allBodies.length} bodies`;

    renderGrid();
}

// ====================================================================
// RENDER
// ====================================================================
function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    let bodies = [...allBodies];

    // Filter
    const filter = document.getElementById('filter-gate').value;
    if (filter === 'pass') bodies = bodies.filter(b => b.passed);
    if (filter === 'fail') bodies = bodies.filter(b => !b.passed);

    // Sort
    if (currentSort === 'peak') bodies.sort((a, b) => (a.worst_peak_db || 999) - (b.worst_peak_db || 999));
    else if (currentSort === 'morph') bodies.sort((a, b) => (b.morph_rms_db || 0) - (a.morph_rms_db || 0));
    else bodies.sort((a, b) => a.name.localeCompare(b.name));

    bodies.forEach(b => {
        if (b.error) return; // skip broken files
        const card = document.createElement('div');
        card.className = 'card' + (keptSet.has(b.file) ? ' kept' : '');
        card.id = `card-${b.file}`;

        card.innerHTML = `
            <div class="card-header">
                <span class="card-name">${b.name}</span>
                <span class="card-badge" style="color:var(--muted)">peak ${b.worst_peak_db > 0 ? '+' : ''}${b.worst_peak_db}dB</span>
            </div>
            <div class="card-stats">morph: ${b.morph_rms_db}dB RMS | ${b.file}</div>
            <canvas width="640" height="240" id="canvas-${b.file}"></canvas>
            <div class="card-actions">
                <button class="keep-btn" onclick="keepBody('${b.file}')">KEEP</button>
                <button class="reject-btn" onclick="rejectBody('${b.file}')">REJECT</button>
            </div>
        `;
        grid.appendChild(card);

        // Draw plot
        requestAnimationFrame(() => drawPlot(`canvas-${b.file}`, b));
    });
}

function drawPlot(canvasId, body) {
    const canvas = document.getElementById(canvasId);
    if (!canvas || !body.sweep) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // dB range
    const dbMin = -40;
    const dbMax = 60;
    const dbRange = dbMax - dbMin;

    // freq range (log scale)
    const fMin = Math.log10(20);
    const fMax = Math.log10(20000);
    const fRange = fMax - fMin;

    // Grid lines
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 0.5;
    // 0dB line
    const y0 = H * (1 - (0 - dbMin) / dbRange);
    ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(W, y0); ctx.stroke();
    // freq markers
    [100, 1000, 10000].forEach(f => {
        const x = W * (Math.log10(f) - fMin) / fRange;
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        ctx.fillStyle = '#333';
        ctx.font = '9px monospace';
        ctx.fillText(f >= 1000 ? (f/1000)+'k' : f+'', x+2, H-3);
    });

    // Morph curves
    const colors = ['#ff4444', '#ffaa00', '#44ff44', '#00aaff', '#aa44ff'];
    const labels = ['M0', 'M25', 'M50', 'M75', 'M100'];
    const morphVals = [0.0, 0.5, 1.0]; // we only have 3 points
    const plotColors = ['#ff4444', '#44ff44', '#aa44ff'];
    const plotLabels = ['M0', 'M50', 'M100'];

    body.sweep.forEach((s, si) => {
        const db = s.db;
        ctx.strokeStyle = plotColors[si] || '#888';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let i = 0; i < freqs.length; i++) {
            const x = W * (Math.log10(freqs[i]) - fMin) / fRange;
            const y = H * (1 - (Math.min(dbMax, Math.max(dbMin, db[i])) - dbMin) / dbRange);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
    });

    // Labels
    ctx.font = 'bold 10px monospace';
    plotLabels.forEach((lbl, i) => {
        ctx.fillStyle = plotColors[i];
        ctx.fillText(lbl, 4 + i * 40, 12);
    });
}

// ====================================================================
// KEEP / REJECT
// ====================================================================
async function keepBody(file) {
    const resp = await fetch(API + '/gallery/keep', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ directory: currentDir, file }),
    });
    if (resp.ok) {
        keptSet.add(file);
        const card = document.getElementById(`card-${file}`);
        if (card) card.classList.add('kept');
    }
}

function rejectBody(file) {
    const card = document.getElementById(`card-${file}`);
    if (card) {
        card.style.opacity = '0.2';
        card.style.pointerEvents = 'none';
    }
}

// ====================================================================
// FILTER / SORT
// ====================================================================
function applyFilter() { renderGrid(); }
function setSort(key) {
    currentSort = key;
    document.querySelectorAll('.sort-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.sort === key);
    });
    renderGrid();
}

init();
</script>
</body>
</html>
